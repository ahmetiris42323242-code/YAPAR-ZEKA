# Yapılandırma
app:
  name: "Ryzen AI Assistant"
  version: "2.0.0"
  debug: false
  secret_key: "CHANGE_THIS_SECRET_KEY"

# Modeller
models:
  default: "gpt-4-turbo"
  providers:
    openai:
      enabled: true
      models: ["gpt-4-turbo", "gpt-3.5-turbo", "gpt-4o"]
    anthropic:
      enabled: false
      models: ["claude-3-opus", "claude-3-sonnet"]
    local:
      enabled: false
      model_path: "models/llama-2-7b.gguf"

# Veritabanı
database:
  type: "sqlite"  # veya "postgresql"
  sqlite_path: "data/assistant.db"
  # postgresql:
  #   host: "localhost"
  #   port: 5432
  #   name: "assistant"

# RAG
rag:
  enabled: true
  vector_db: "chromadb"
  embedding_model: "all-MiniLM-L6-v2"
  chunk_size: 500
  chunk_overlap: 50

# Güvenlik
security:
  rate_limit:
    enabled: true
    max_requests: 100
    time_window: 60  # saniye
  content_filter:
    enabled: true
    threshold: 0.8

# Logging
logging:
  level: "INFO"
  file: "data/logs/assistant.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# API
api:
  enabled: true
  port: 8000
  cors_origins: ["*"]
